<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartões digitais · Costanza & Fiel Advocacia</title>
<meta name="theme-color" content="#000000">
<style>
  :root{--bg:#000;--ink:#f4f1ec;--soft:#a7a29a;--mute:#67625b;--orange:#d2814a;--orange-soft:#e7a877;--hair:rgba(255,255,255,.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
    background-image:radial-gradient(60% 40% at 50% 30%,rgba(210,129,74,.10),transparent 70%)}
  .wrap{width:100%;max-width:380px;text-align:center}
  .mono{width:70px;height:70px;margin:0 auto 22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 35% 25%,#1c1a17,#0a0908);border:1px solid rgba(210,129,74,.35);
    box-shadow:0 0 40px -8px rgba(210,129,74,.4)}
  .mono svg{width:38px}.mono svg path{fill:var(--ink)}
  h1{font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--soft);font-weight:600;margin-bottom:6px}
  .sub{font-size:11px;letter-spacing:1px;color:var(--mute);margin-bottom:28px}
  a.card{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;text-decoration:none;
    background:rgba(255,255,255,.025);border:1px solid var(--hair);color:var(--ink);margin-bottom:12px;transition:border-color .2s,background .2s}
  a.card:hover{border-color:rgba(210,129,74,.4);background:rgba(210,129,74,.06)}
  a.card .nm{font-size:16px;font-weight:700}
  a.card .rl{font-size:11px;color:var(--soft);margin-top:2px;letter-spacing:.5px}
  a.card .arw{margin-left:auto;color:var(--orange-soft)}
  .t{text-align:left}
</style>
</head>
<body>
  <div class="wrap">

    <a class="card" href="./fiel/"><div class="t"><div class="nm">Edson Fiel Filho</div><div class="rl">Advogado · OAB/SE 18.246</div></div><span class="arw">→</span></a>
  </div>
</body>
</html>
