<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Edson Fiel Filho · Costanza & Fiel Advocacia</title>
<meta name="description" content="Cartão de visita digital — Edson Fiel Filho, advogado. Costanza & Fiel Advocacia.">
<meta property="og:title" content="Edson Fiel Filho · Advogado">
<meta property="og:description" content="Costanza & Fiel Advocacia — toque para ligar, enviar e-mail, abrir o site ou salvar o contato.">
<meta property="og:type" content="profile">
<meta name="theme-color" content="#000000">
<style>
  :root{
    --bg:#000; --ink:#f4f1ec; --soft:#a7a29a; --mute:#67625b;
    --orange:#d2814a; --orange-soft:#e7a877; --orange-deep:#9c5a2c;
    --hair:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);overflow:hidden;
    height:100dvh;width:100%;position:fixed;inset:0;
  }
  .stage{position:relative;width:100%;height:100dvh;overflow:hidden}
  .stage::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(60% 45% at 50% 50%,rgba(210,129,74,.10),transparent 70%)}

  .header{position:absolute;top:0;left:0;right:0;z-index:40;
    padding:max(26px,env(safe-area-inset-top)) 20px 0;text-align:center;pointer-events:none}
  .header h1{font-size:23px;font-weight:800;letter-spacing:-.3px;color:var(--ink)}
  .header .role{margin-top:7px;font-size:10.5px;font-weight:600;letter-spacing:.5px;color:var(--soft)}
  .header .role .sp{letter-spacing:3.5px;color:var(--orange-soft);font-weight:700}
  .header .role .dot{color:var(--orange);margin:0 5px}
  .header .hint{margin-top:14px;font-size:10px;letter-spacing:2px;color:var(--mute);text-transform:uppercase}

  .orbit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .ring{position:absolute;border-radius:50%;border:1px solid var(--hair)}
  .ring.r1{width:360px;height:360px}
  .ring.r2{width:480px;height:480px;border-color:rgba(255,255,255,.05)}

  .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;
    width:96px;height:96px;display:flex;align-items:center;justify-content:center}
  .core .halo,.core .halo2{position:absolute;border-radius:50%;border:1px solid rgba(210,129,74,.4)}
  .core .halo{width:96px;height:96px;animation:ping 3s cubic-bezier(0,0,.2,1) infinite}
  .core .halo2{width:96px;height:96px;border-color:rgba(210,129,74,.22);animation:ping 3s cubic-bezier(0,0,.2,1) 1.2s infinite}
  .core .disc{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 35% 25%,#1c1a17,#0a0908);
    border:1px solid rgba(210,129,74,.35);
    box-shadow:0 0 40px -8px rgba(210,129,74,.45),inset 0 0 18px rgba(0,0,0,.6)}
  .core .disc svg{width:42px;height:auto;display:block}
  .core .disc svg path{fill:var(--ink)}
  @keyframes ping{0%{transform:scale(.85);opacity:.8}75%,100%{transform:scale(1.5);opacity:0}}

  .node{position:absolute;left:50%;top:50%;z-index:20;cursor:pointer;
    width:46px;height:46px;margin:-23px 0 0 -23px;will-change:transform}
  .node .bulb{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:#0c0b0a;border:1.5px solid rgba(255,255,255,.32);color:var(--ink);
    transition:transform .3s ease,background .3s,border-color .3s,box-shadow .3s}
  .node .bulb svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .node .nlabel{position:absolute;top:52px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);
    transition:color .3s,transform .3s;pointer-events:none}
  .node.active{z-index:60}
  .node.active .bulb{background:var(--orange);border-color:var(--orange-soft);color:#1a0f06;
    transform:scale(1.35);box-shadow:0 0 30px -4px rgba(210,129,74,.7)}
  .node.active .nlabel{color:var(--ink);transform:translateX(-50%) scale(1.05)}

  .panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.92);
    z-index:70;width:min(82vw,300px);opacity:0;pointer-events:none;
    transition:opacity .3s ease,transform .3s ease}
  .panel.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .panel .box{background:rgba(10,9,8,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(210,129,74,.3);border-radius:18px;padding:22px 22px 20px;
    box-shadow:0 26px 60px -24px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.03)}
  .panel .plabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--orange-soft);font-weight:700}
  .panel .pval{margin-top:8px;font-size:18px;font-weight:700;color:var(--ink);line-height:1.25;word-break:break-word}
  .panel .psub{margin-top:5px;font-size:12px;color:var(--soft);line-height:1.4}
  .panel .pbtn{margin-top:18px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
    text-decoration:none;border:none;cursor:pointer;padding:13px;border-radius:12px;
    background:linear-gradient(135deg,var(--orange-soft),var(--orange) 60%,var(--orange-deep));
    color:#1a0f06;font-size:13.5px;font-weight:800;letter-spacing:.3px;
    box-shadow:0 12px 26px -12px rgba(210,129,74,.6)}
  .panel .pbtn svg{width:16px;height:16px;stroke:#1a0f06;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .panel .pclose{position:absolute;top:10px;right:12px;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mute);
    background:rgba(255,255,255,.04);border:1px solid var(--hair)}
  .panel .pclose svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}

  .footer{position:absolute;bottom:0;left:0;right:0;z-index:40;
    padding:0 20px max(24px,env(safe-area-inset-bottom));text-align:center}
  .footer .save{width:min(86vw,330px);margin:0 auto 14px;border:none;cursor:pointer;
    padding:15px;border-radius:13px;background:rgba(255,255,255,.04);
    border:1px solid rgba(210,129,74,.32);color:var(--ink);
    font-size:13.5px;font-weight:700;letter-spacing:.4px;
    display:flex;align-items:center;justify-content:center;gap:9px;transition:background .2s,border-color .2s}
  .footer .save:active{background:rgba(210,129,74,.12)}
  .footer .save svg{width:17px;height:17px;stroke:var(--orange-soft);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .footer .org{font-size:10px;letter-spacing:3px;color:var(--mute);text-transform:uppercase}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="header">
      <h1>Edson Fiel Filho</h1>
      <div class="role"><span class="sp">ADVOGADO</span><span class="dot">·</span>OAB/SE 18.246</div>
      <div class="hint">toque nos pontos</div>
    </div>

    <div class="orbit" id="orbit">
      <div class="ring r1"></div>
      <div class="ring r2"></div>

      <div class="core" aria-label="Costanza & Fiel">
        <span class="halo"></span><span class="halo2"></span>
        <span class="disc">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="25 47 37 29"><g transform="translate(0,115.2) scale(0.024,-0.024)"><path d="M1540 2784 c-200 -43 -375 -207 -426 -398 -18 -66 -18 -207 1 -275 56 -212 252 -377 483 -405 l52 -7 0 85 c0 85 0 86 -27 91 -186 38 -288 120 -334 269 -43 136 -4 272 107 375 59 56 145 101 192 101 9 0 27 3 40 6 21 6 22 12 22 90 0 97 6 93 -110 68z M1812 2253 l3 -547 83 0 83 -1 -1 458 0 457 305 0 305 0 0 90 0 90 -390 0 -390 0 2 -547z M2200 2315 l0 -85 90 0 90 0 0 85 0 85 -90 0 -90 0 0 -85z"/></g></svg>
        </span>
      </div>
    </div>

    <div class="panel" id="panel">
      <div class="box">
        <span class="pclose" id="pclose"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></span>
        <div class="plabel" id="plabel"></div>
        <div class="pval" id="pval"></div>
        <div class="psub" id="psub"></div>
        <a class="pbtn" id="pbtn" href="#"><span id="pbtnlabel"></span></a>
      </div>
    </div>

    <div class="footer">
      <button class="save" id="save" type="button">
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        Salvar contato
      </button>
      <div class="org">Costanza &amp; Fiel Advocacia</div>
    </div>
  </div>

<script>
(function(){
  var ICON = {
    wa:'<path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 1 1 16.1-3.8z"/>',
    phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>',
    mail:'<path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="M22 6l-10 7L2 6"/>',
    globe:'<circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
    pin:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>'
  };
  var NODES = [
    {key:'wa',  icon:'wa',    label:'WhatsApp', value:'+55 (79) 99809-7995', sub:'Conversa direta', btn:'Abrir WhatsApp', href:'https://wa.me/5579998097995?text=Ol%C3%A1%2C%20Dr.%20Fiel.'},
    {key:'tel', icon:'phone', label:'Telefone', value:'+55 (79) 99809-7995', sub:'Toque para ligar',  btn:'Ligar agora',   href:'tel:+5579998097995'},
    {key:'mail',icon:'mail',  label:'E-mail',   value:'fiel@advocaciacf.com.br', sub:'', btn:'Enviar e-mail', href:'mailto:fiel@advocaciacf.com.br'},
    {key:'site',icon:'globe', label:'Site',     value:'costanzaefiel.com.br', sub:'Site institucional', btn:'Abrir site', href:'https://costanzaefiel.com.br'},
    {key:'map', icon:'pin',   label:'Endereço', value:'R. Vereador João Calazans, 314', sub:'13 de Julho · Aracaju/SE · CEP 49020-030', btn:'Abrir no Maps', href:'https://www.google.com/maps/search/?api=1&query=Rua%20Vereador%20Jo%C3%A3o%20Calazans%2C%20314%2C%2013%20de%20Julho%2C%20Aracaju%20-%20SE'}
  ];

  var orbit = document.getElementById('orbit');
  var panel = document.getElementById('panel');
  var nodeEls = [];
  NODES.forEach(function(n,i){
    var el = document.createElement('div');
    el.className = 'node';
    el.innerHTML = '<div class="bulb"><svg viewBox="0 0 24 24">'+ICON[n.icon]+'</svg></div><div class="nlabel">'+n.label+'</div>';
    el.addEventListener('click', function(e){ e.stopPropagation(); openNode(i); });
    orbit.appendChild(el);
    nodeEls.push(el);
  });

  var N = NODES.length;
  var radius = 150, rotation = 0, targetRotation = null, auto = true, activeIdx = null;

  function computeRadius(){
    var w = window.innerWidth, h = window.innerHeight;
    radius = Math.max(110, Math.min(170, Math.min(w,h)/2 - 78));
    document.querySelector('.ring.r1').style.cssText = 'width:'+(radius*2)+'px;height:'+(radius*2)+'px';
    document.querySelector('.ring.r2').style.cssText = 'width:'+(radius*2+120)+'px;height:'+(radius*2+120)+'px;border-color:rgba(255,255,255,.05)';
  }
  computeRadius();
  window.addEventListener('resize', computeRadius);

  function place(){
    for(var i=0;i<N;i++){
      var ang = ((i/N)*360 + rotation) % 360;
      var rad = ang*Math.PI/180;
      var x = radius*Math.cos(rad), y = radius*Math.sin(rad);
      var depth = (1+Math.sin(rad))/2;
      var z = Math.round(10 + 40*Math.cos(rad));
      var op = (activeIdx===i)?1:Math.max(.45, .45+.55*depth);
      var sc = (activeIdx===i)?1:(0.9 + 0.18*depth);
      var el = nodeEls[i];
      el.style.transform = 'translate('+x.toFixed(1)+'px,'+y.toFixed(1)+'px) scale('+sc.toFixed(3)+')';
      el.style.zIndex = (activeIdx===i)?60:z;
      el.style.opacity = op.toFixed(2);
    }
  }

  function loop(){
    if(targetRotation!==null){
      var d = ((targetRotation - rotation +540)%360)-180;
      if(Math.abs(d)<0.25){ rotation = targetRotation; targetRotation=null; }
      else { rotation += d*0.12; }
    } else if(auto){ rotation = (rotation + 0.12) % 360; }
    place();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function openNode(i){
    var n = NODES[i];
    activeIdx = i; auto = false;
    targetRotation = (270 - (i/N)*360) % 360;
    nodeEls.forEach(function(e,j){ e.classList.toggle('active', j===i); });
    document.getElementById('plabel').textContent = n.label;
    document.getElementById('pval').textContent = n.value;
    var psub = document.getElementById('psub');
    psub.textContent = n.sub || ''; psub.style.display = n.sub ? 'block':'none';
    var btn = document.getElementById('pbtn');
    btn.href = n.href;
    if(n.key==='wa' || n.key==='site' || n.key==='map'){ btn.target='_blank'; btn.rel='noopener'; }
    else { btn.removeAttribute('target'); }
    document.getElementById('pbtnlabel').textContent = n.btn;
    panel.classList.add('show');
  }
  function closePanel(){
    activeIdx = null; auto = true;
    nodeEls.forEach(function(e){ e.classList.remove('active'); });
    panel.classList.remove('show');
  }
  document.getElementById('pclose').addEventListener('click', function(e){ e.stopPropagation(); closePanel(); });
  document.getElementById('stage').addEventListener('click', function(e){
    if(e.target.id==='stage' || e.target.id==='orbit' || e.target.classList.contains('ring')) closePanel();
  });
  panel.addEventListener('click', function(e){ e.stopPropagation(); });

  var vcard = [
    "BEGIN:VCARD","VERSION:3.0","N:Fiel Filho;Edson;;;","FN:Edson Fiel Filho",
    "ORG:Costanza & Fiel Advocacia","TITLE:Advogado — OAB/SE 18.246",
    "TEL;TYPE=CELL,VOICE:+5579998097995","TEL;TYPE=WORK,VOICE:+557932242211",
    "EMAIL;TYPE=WORK:fiel@advocaciacf.com.br","URL:https://costanzaefiel.com.br",
    "ADR;TYPE=WORK:;;Rua Vereador João Calazans, 314;Aracaju;SE;49020-030;Brasil",
    "NOTE:Costanza & Fiel Advocacia","END:VCARD"
  ].join("\r\n");
  document.getElementById('save').addEventListener('click', function(e){
    e.stopPropagation();
    var blob=new Blob([vcard],{type:"text/vcard;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download="Edson-Fiel-Filho.vcf";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1500);
  });
})();
</script>
</body>
</html>
